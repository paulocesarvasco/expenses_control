services:
  db:
    image: postgres:16-alpine
    container_name: expenses-db
    environment:
      POSTGRES_DB: expenses
      POSTGRES_USER: expenses
      POSTGRES_PASSWORD: expenses
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expenses -d expenses"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  app:
    build:
      context: .
    container_name: expenses-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: postgresql+psycopg://expenses:expenses@db:5432/expenses
    ports:
      - "5000:5000"
    restart: unless-stopped

volumes:
  postgres_data:
