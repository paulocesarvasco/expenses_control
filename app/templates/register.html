{% extends "base.html" %}

{% block title %}Registro{% endblock %}
{% block content_title %}Registrar nova compra{% endblock %}

{% block content %}
<div class="container mt-4">
    <style>
        .product-picker {
            position: relative;
        }

        .product-picker-menu {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            z-index: 20;
            max-height: 220px;
            overflow-y: auto;
            display: none;
            padding: 6px 0;
            border: 1px solid #ced4da;
            border-radius: 0.375rem;
            background: #fff;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
        }

        .product-picker-menu.is-open {
            display: block;
        }

        .product-picker-option {
            width: 100%;
            padding: 8px 12px;
            border: 0;
            background: transparent;
            text-align: left;
        }

        .product-picker-option:hover,
        .product-picker-option:focus {
            background: #f1f3f5;
            outline: none;
        }

        .product-picker-empty {
            padding: 8px 12px;
            color: #6c757d;
            font-size: 0.95rem;
        }
    </style>
    <form id="purchaseForm">
        <div class="form-section">
            <h3>Informações da Loja</h3>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="storeName" class="form-label">Loja</label>
                    <input type="text" class="form-control" id="storeName" required>
                </div>
                <div class="col-md-3">
                    <label for="purchaseDate" class="form-label">Dia da Compra</label>
                    <input type="date" class="form-control" id="purchaseDate" required>
                </div>
                <div class="col-md-3">
                    <label for="paymentMethod" class="form-label">Método de Pagamento</label>
                    <select class="form-select" id="paymentMethod" required>
                        <option value="">Selecione...</option>
                        {% for payment_method in payment_methods %}
                        <option value="{{ payment_method.payment_method_name }}">{{ payment_method.payment_method_name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3>Itens Comprados</h3>
                <button type="button" class="btn btn-primary" id="addItemBtn">+ Adicionar Item</button>
            </div>

            <div id="items-container">
                <div class="item-row mb-3" data-item-index="0">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Nome do Produto</label>
                            <div class="product-picker">
                                <input type="text" class="form-control item-product" required autocomplete="off" placeholder="Selecione ou digite um produto">
                                <div class="product-picker-menu"></div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Marca</label>
                            <input type="text" class="form-control item-brand">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Quantidade</label>
                            <input type="number" class="form-control item-quantity" min="0.001" step="0.001" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Valor Pago (R$)</label>
                            <input type="number" class="form-control item-price" min="0.01" step="0.01" required>
                        </div>
                        <div class="col-md-1 d-flex align-items-end">
                            <button type="button" class="btn btn-danger remove-item">✕</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
            <button type="submit" class="btn btn-success">
                <span id="submitText">Registrar Compra</span>
                <div id="loadingSpinner" class="spinner-border spinner-border-sm ms-2" role="status" style="display: none;">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </button>
        </div>
    </form>
</div>

<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
    <div id="successToast" class="toast align-items-center text-white bg-success" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
    <div id="errorToast" class="toast align-items-center text-white bg-danger" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const successToast = new bootstrap.Toast(document.getElementById('successToast'));
    const errorToast = new bootstrap.Toast(document.getElementById('errorToast'));
    const form = document.getElementById('purchaseForm');
    let productOptions = [];

    document.getElementById('purchaseDate').valueAsDate = new Date();
    loadProducts();

    document.getElementById('addItemBtn').addEventListener('click', addNewItem);

    function getErrorMessage(payload, fallback) {
        return payload?.error?.message || payload?.error || fallback;
    }

    document.addEventListener('click', function(e) {
        if (e.target.classList.contains('remove-item')) {
            if (document.querySelectorAll('.item-row').length > 1) {
                e.target.closest('.item-row').remove();
                reindexItems();
            } else {
                showError('Você precisa de pelo menos um item na compra.');
            }
        }
    });

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        const submitButton = e.target.querySelector('button[type="submit"]');
        const submitText = document.getElementById('submitText');
        const spinner = document.getElementById('loadingSpinner');

        submitText.textContent = 'Processando...';
        spinner.style.display = 'inline-block';
        submitButton.disabled = true;

        try {
            const formData = collectFormData();
            const response = await fetch('{{ url_for("expenses.purchases.save_purchase") }}', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });

            if (response.status === 201) {
                showSuccess('Compra registrada com sucesso!');
                resetPurchaseForm();
            } else {
                const payload = await response.json();
                throw new Error(getErrorMessage(payload, 'Erro ao registrar compra'));
            }
        } catch (error) {
            showError(error.message);
        } finally {
            submitText.textContent = 'Registrar Compra';
            spinner.style.display = 'none';
            submitButton.disabled = false;
        }
    });

    function addNewItem() {
        const itemsContainer = document.getElementById('items-container');
        const itemCount = document.querySelectorAll('.item-row').length;
        const newItem = document.createElement('div');
        newItem.className = 'item-row mb-3';
        newItem.dataset.itemIndex = itemCount;
        newItem.innerHTML = `
            <div class="row g-3">
                <div class="col-md-4">
                    <div class="product-picker">
                        <input type="text" class="form-control item-product" required autocomplete="off" placeholder="Selecione ou digite um produto">
                        <div class="product-picker-menu"></div>
                    </div>
                </div>
                <div class="col-md-3">
                    <input type="text" class="form-control item-brand">
                </div>
                <div class="col-md-2">
                    <input type="number" class="form-control item-quantity" min="0.001" step="0.001" required>
                </div>
                <div class="col-md-2">
                    <input type="number" class="form-control item-price" min="0.01" step="0.01" required>
                </div>
                <div class="col-md-1 d-flex align-items-center">
                    <button type="button" class="btn btn-danger remove-item">✕</button>
                </div>
            </div>
        `;
        itemsContainer.appendChild(newItem);
        setupProductPicker(newItem);
    }

    async function loadProducts() {
        try {
            const response = await fetch('{{ url_for("expenses.products.list_products") }}');
            if (response.ok) {
                productOptions = await response.json();
                document.querySelectorAll('.item-row').forEach(setupProductPicker);
            } else {
                throw new Error('Falha ao carregar produtos');
            }
        } catch (error) {
            showError(error.message);
        }
    }

    function setupProductPicker(row) {
        const picker = row.querySelector('.product-picker');
        if (!picker || picker.dataset.initialized === 'true') {
            return;
        }

        const input = picker.querySelector('.item-product');
        const menu = picker.querySelector('.product-picker-menu');

        input.addEventListener('focus', function() {
            renderProductOptions(menu, input, input.value);
        });

        input.addEventListener('input', function() {
            renderProductOptions(menu, input, input.value);
        });

        input.addEventListener('blur', function() {
            window.setTimeout(() => {
                menu.classList.remove('is-open');
            }, 120);
        });

        picker.dataset.initialized = 'true';
    }

    function renderProductOptions(menu, input, query) {
        const normalizedQuery = (query || '').trim().toLowerCase();
        const filteredProducts = productOptions.filter(product =>
            product.toLowerCase().includes(normalizedQuery)
        );

        menu.innerHTML = '';

        if (filteredProducts.length === 0) {
            const empty = document.createElement('div');
            empty.className = 'product-picker-empty';
            empty.textContent = 'Nenhum produto encontrado';
            menu.appendChild(empty);
        } else {
            filteredProducts.forEach(product => {
                const option = document.createElement('button');
                option.type = 'button';
                option.className = 'product-picker-option';
                option.textContent = product;
                option.addEventListener('mousedown', function() {
                    input.value = product;
                    menu.classList.remove('is-open');
                });
                menu.appendChild(option);
            });
        }

        menu.classList.add('is-open');
    }

    function reindexItems() {
        document.querySelectorAll('.item-row').forEach((row, index) => {
            row.dataset.itemIndex = index;
        });
    }

    function resetPurchaseForm() {
        form.reset();
        document.getElementById('purchaseDate').valueAsDate = new Date();

        const itemsContainer = document.getElementById('items-container');
        const rows = Array.from(itemsContainer.querySelectorAll('.item-row'));
        rows.slice(1).forEach(row => row.remove());

        const firstRow = itemsContainer.querySelector('.item-row');
        if (firstRow) {
            firstRow.querySelector('.item-product').value = '';
            firstRow.querySelector('.item-brand').value = '';
            firstRow.querySelector('.item-quantity').value = '';
            firstRow.querySelector('.item-price').value = '';

            const menu = firstRow.querySelector('.product-picker-menu');
            if (menu) {
                menu.classList.remove('is-open');
                menu.innerHTML = '';
            }
        }

        reindexItems();
    }

    function collectFormData() {
        return {
            store_name: document.getElementById('storeName').value,
            purchase_date: document.getElementById('purchaseDate').value,
            payment_method: document.getElementById('paymentMethod').value,
            items: Array.from(document.querySelectorAll('.item-row')).map(row => ({
                product_name: row.querySelector('.item-product').value,
                quantity: parseFloat(row.querySelector('.item-quantity').value),
                price: parseFloat(row.querySelector('.item-price').value),
                brand: row.querySelector('.item-brand').value || null
            }))
        };
    }

    function showSuccess(message) {
        const toastBody = successToast._element.querySelector('.toast-body');
        toastBody.textContent = message;
        successToast.show();
    }

    function showError(message) {
        const toastBody = errorToast._element.querySelector('.toast-body');
        toastBody.textContent = message;
        errorToast.show();
    }

    setupProductPicker(document.querySelector('.item-row'));
});
</script>
{% endblock %}
