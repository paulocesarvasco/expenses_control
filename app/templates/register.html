{% extends "base.html" %}

{% block title %}Registro{% endblock %}

{% block content_title %}Registrar nova compra{% endblock %}

{% block content %}
<div class="container mt-4">
    <form id="purchaseForm">
        <div class="form-section">
            <h3>Informações da Loja</h3>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="storeName" class="form-label">Loja</label>
                    <input type="text" class="form-control" id="storeName" required>
                </div>
                <div class="col-md-3">
                    <label for="purchaseDate" class="form-label">Dia da Compra</label>
                    <input type="date" class="form-control" id="purchaseDate" required>
                </div>
                <div class="col-md-3">
                    <label for="paymentMethod" class="form-label">Método de Pagamento</label>
                    <select class="form-select" id="paymentMethod" required>
                        <option value="">Selecione...</option>
                        <option value="Cartão de Crédito">Cartão de Crédito</option>
                        <option value="Cartão de Débito">Cartão de Débito</option>
                        <option value="Dinheiro">Dinheiro</option>
                        <option value="PIX">PIX</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3>Itens Comprados</h3>
                <button type="button" class="btn btn-primary" id="addItemBtn">+ Adicionar Item</button>
            </div>

            <div id="items-container">
                <div class="item-row" data-item-index="0">
                    <div class="row g-3">
                        <div class="col-md-5">
                            <label class="form-label">Nome do Produto</label>
                            <div class="input-group">
                                <input type="text" class="form-control item-product" required list="productList">
                                <button class="btn btn-outline-secondary" type="button" onclick="loadProducts()">
                                    <i class="fas fa-sync-alt"></i>
                                </button>
                            </div>
                            <datalist id="productList"></datalist>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Quantidade</label>
                            <input type="number" class="form-control item-quantity" min="0.001" step="0.001" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Valor Pago (R$)</label>
                            <input type="number" class="form-control item-price" min="0.01" step="0.01" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Marca</label>
                            <input type="text" class="form-control item-brand">
                        </div>
                        <div class="col-md-1 d-flex align-items-end">
                            <button type="button" class="btn btn-danger remove-item">✕</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
            <button type="submit" class="btn btn-success">
                <span id="submitText">Registrar Compra</span>
                <div id="loadingSpinner" class="spinner-border spinner-border-sm ms-2" role="status" style="display: none;">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </button>
        </div>
    </form>
</div>

<!-- Toast Notifications -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
    <div id="successToast" class="toast align-items-center text-white bg-success" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
    <div id="errorToast" class="toast align-items-center text-white bg-danger" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const successToast = new bootstrap.Toast(document.getElementById('successToast'));
    const errorToast = new bootstrap.Toast(document.getElementById('errorToast'));
    const form = document.getElementById('purchaseForm');

    // Set today's date as default
    document.getElementById('purchaseDate').valueAsDate = new Date();

    // Load products on page load
    loadProducts();

    // Add item button functionality
    document.getElementById('addItemBtn').addEventListener('click', addNewItem);

    // Remove item functionality
    document.addEventListener('click', function(e) {
        if (e.target.classList.contains('remove-item')) {
            if (document.querySelectorAll('.item-row').length > 1) {
                e.target.closest('.item-row').remove();
                reindexItems();
            } else {
                showError('Você precisa de pelo menos um item na compra.');
            }
        }
    });

    // Form submission
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        const submitButton = e.target.querySelector('button[type="submit"]');
        const submitText = document.getElementById('submitText');
        const spinner = document.getElementById('loadingSpinner');

        // Show loading state
        submitText.textContent = 'Processando...';
        spinner.style.display = 'inline-block';
        submitButton.disabled = true;

        try {
            const formData = collectFormData();
            const response = await fetch('{{ url_for("expenses.purchases.save_purchase") }}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(formData)
            });

            if (response.status === 201) {
                showSuccess('Compra registrada com sucesso!');
                setTimeout(() => window.location.reload(), 1000);
            } else {
                const error = await response.json();
                throw new Error(error.message || 'Erro ao registrar compra');
            }
        } catch (error) {
            console.error('Error:', error);
            showError(error.message);
        } finally {
            submitText.textContent = 'Registrar Compra';
            spinner.style.display = 'none';
            submitButton.disabled = false;
        }
    });

    function addNewItem() {
        const itemsContainer = document.getElementById('items-container');
        const itemCount = document.querySelectorAll('.item-row').length;
        const newItem = document.createElement('div');
        newItem.className = 'item-row mb-3';
        newItem.dataset.itemIndex = itemCount;
        newItem.innerHTML = `
            <div class="row g-3">
                <div class="col-md-5">
                    <div class="input-group">
                        <input type="text" class="form-control item-product" required list="productList">
                        <button class="btn btn-outline-secondary" type="button" onclick="loadProducts()">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                </div>
                <div class="col-md-2">
                    <input type="number" class="form-control item-quantity" min="0.001" step="0.001" required>
                </div>
                <div class="col-md-2">
                    <input type="number" class="form-control item-price" min="0.01" step="0.01" required>
                </div>
                <div class="col-md-2">
                    <input type="text" class="form-control item-brand">
                </div>
                <div class="col-md-1 d-flex align-items-center">
                    <button type="button" class="btn btn-danger remove-item">✕</button>
                </div>
            </div>
        `;
        itemsContainer.appendChild(newItem);
    }

    async function loadProducts() {
        try {
            const response = await fetch('{{ url_for("expenses.products.list_products") }}');
            if (response.ok) {
                const products = await response.json();
                const productList = document.getElementById('productList');
                productList.innerHTML = '';

                // Simplified for array of strings
                products.forEach(productName => {
                    const option = document.createElement('option');
                    option.value = productName;
                    productList.appendChild(option);
                });
            } else {
                throw new Error('Failed to load products');
            }
        } catch (error) {
            console.error('Error loading products:', error);
            showError('Erro ao carregar lista de produtos');
        }
    }


    function reindexItems() {
        document.querySelectorAll('.item-row').forEach((row, index) => {
            row.dataset.itemIndex = index;
        });
    }

    function collectFormData() {
        return {
            store_name: document.getElementById('storeName').value,
            purchase_date: document.getElementById('purchaseDate').value,
            payment_method: document.getElementById('paymentMethod').value,
            items: Array.from(document.querySelectorAll('.item-row')).map(row => ({
                product_name: row.querySelector('.item-product').value,
                quantity: parseFloat(row.querySelector('.item-quantity').value),
                price: parseFloat(row.querySelector('.item-price').value),
                brand: row.querySelector('.item-brand').value || null
            }))
        };
    }

    function showSuccess(message) {
        const toastBody = successToast._element.querySelector('.toast-body');
        toastBody.textContent = message;
        successToast.show();
    }

    function showError(message) {
        const toastBody = errorToast._element.querySelector('.toast-body');
        toastBody.textContent = message;
        errorToast.show();
    }
});

// Make loadProducts available globally for button clicks
window.loadProducts = loadProducts;
</script>
{% endblock %}
